version: '3.9'

networks:
  frontend_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24
  app_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24
  db_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.3.0/24

volumes:
  nextcloud_data:
  postgres_data:
  redis_data:

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_proxy
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend_net
      - app_net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  nextcloud:
    image: nextcloud:27-apache
    container_name: nextcloud_app
    networks:
      - frontend_net
      - app_net
    environment:
      - POSTGRES_HOST=postgres_db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=ncuser
      - POSTGRES_PASSWORD=pass_nextcloud_cun
      - NEXTCLOUD_ADMIN_USER=admin_cun
      - NEXTCLOUD_ADMIN_PASSWORD=Admin_CUN_2026
    volumes:
      - nextcloud_data:/var/www/html
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    networks:
      - db_net
      - app_net
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=ncuser
      - POSTGRES_PASSWORD=pass_nextcloud_cun
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    command: redis-server --requirepass pass_redis_cun
    networks:
      - app_net
    restart: unless-stopped
